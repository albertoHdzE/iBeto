# iBeto configuration.
# The single place to change the backend and model. No code edits needed.

# LM Studio's OpenAI-compatible endpoint.
base_url = "http://localhost:1234/v1"

# Model id as reported by LM Studio (`curl http://localhost:1234/v1/models`).
# gemma-4-12b-it-mlx: vision-capable, natural in ES/DE/JA/FR, and scored 15/15 on
# the hallucination/false-premise battery (scripts/bench_correctness.py) — matching
# mistral-small-24b while being faster (TTFT ~0.53s, ~99 tok/s) with a 256k context.
# Chosen from measurement on the M3 Ultra, not reputation.
# Switch live with /model (e.g. mistral-small-3.2-24b for harder one-offs).
# iBeto loads this model automatically at startup.
model = "gemma-4-12b-it-mlx"

# Sampling temperature. Lower = more focused, higher = more creative.
temperature = 0.7

# Reasoning ("thinking") mode. false = fast replies for casual chat;
# true = the model reasons before answering (slower, better on hard questions).
# Toggle live in chat: "/think on", "/think off" (or say "think harder" in voice).
enable_thinking = false

# Hard cap on tokens generated per reply. A seatbelt against runaway reasoning.
# gemma-4-12b is non-reasoning and showed no runaway, and the M3 Ultra generates
# at ~100 tok/s, so this is raised from the 8 GB-era 800. Keep some cap.
max_tokens = 2048

# System prompt file to load from ibeto/prompts/<name>.md
system_prompt = "assistant"

# --- Voice mode (uv run ibeto --voice) ---
# Whisper model size for speech-to-text: base | small | medium | large-v3
# Larger = more accurate, slower, bigger download. 'base' is a good start.
whisper_model = "base"

# Force the spoken language so short/noisy audio isn't misdetected (e.g.
# English heard as Japanese). Use an ISO code like "en", "es", "de", "ja".
# Set to "" to auto-detect (less reliable on the 'base' model).
stt_language = "en"

# Text-to-speech engine:
#   "xtts"   = ONE natural neural voice for every language (en/de/fr/es/it/pt/
#              ja/zh/ar). Most consistent/natural. Needs the xtts extra
#              (./scripts/setup.sh installs it) and ~1.8 GB model, ~17s to load.
#   "kokoro" = fast native per-language voices (different voice per language,
#              ~0.15 RTF, no torch). Good if you want snappy turn-taking.
#   "say"    = robotic macOS voice, zero deps (last-resort fallback).
tts_engine = "xtts"

# The single XTTS voice (built-in speaker). Try: Claribel Dervla, Ana Florence,
# Damien Black, Viktor Menelaos, Daisy Studious. Only used when tts_engine="xtts".
tts_xtts_speaker = "Claribel Dervla"

# Voice. For kokoro: a voice id (British: bf_isabella, bf_emma, bm_george,
# bm_lewis; US: af_heart, am_michael; also es/fr/ja voices). For engine="say":
# a macOS voice name (list with:  say -v '?').
tts_voice = "bf_isabella"

# Kokoro speaking rate (0.5 slow – 2.0 fast). Ignored by engine="say".
tts_speed = 1.0

# Kokoro model cache dir. Empty = ~/.cache/ibeto/kokoro.
tts_model_dir = ""

# Per-language voices. Each reply is routed by its script (Arabic / Chinese /
# Japanese / else) to the right voice, so it speaks in its own language.
# Chinese + Japanese use Kokoro; Arabic uses Piper (Kokoro has no Arabic voice).
# Latin-script languages (en/de/fr/es/it/pt) are told apart by language
# detection (lingua); each is spoken in a native voice. Non-Latin by script.
tts_voice_zh = "zf_xiaobei"        # Kokoro Mandarin (zf_*/zm_* voices)
tts_voice_ja = "Kyoko"             # macOS JA voice (Eddy/Kyoko/...); neural engines
                                   # can't read kanji, so Japanese uses Apple's voice
tts_voice_ar = "ar_JO-kareem-medium"  # Piper voice id (auto-downloaded on first use)
tts_voice_de = "de_DE-thorsten-medium"  # Piper German (Kokoro has no German)
tts_voice_es = "ef_dora"           # Kokoro Spanish
tts_voice_fr = "ff_siwis"          # Kokoro French
tts_voice_it = "if_sara"           # Kokoro Italian
tts_voice_pt = "pf_dora"           # Kokoro Portuguese
tts_piper_dir = ""                 # Piper cache dir. Empty = ~/.cache/ibeto/piper

# --- Vision (type /look in chat) ---
# Requires a vision-language model loaded in LM Studio. The default
# gemma-4-12b-it-mlx is a VLM, so no model swap is needed for /look.
# OpenCV camera index; iPhone via Continuity Camera is usually 0 or 1.
camera_index = 0

